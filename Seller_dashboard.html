<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard - BookBazaar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5e6d3;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .logo {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .logo-text {
            font-size: 28px;
            color: #333;
        }

        h1 {
            font-size: 36px;
            color: #333;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 16px;
            color: #666;
            font-style: italic;
        }

        .dashboard-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        }

        .dashboard-title {
            font-size: 28px;
            color: #333;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dashboard-title::before {
            content: "📚";
            font-size: 32px;
        }

        .form-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #666;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #ffe0cc;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            color: #666;
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="email"],
        input[type="number"],
        input[type="date"],
        select,
        textarea {
            padding: 12px 15px;
            border: 2px solid #ffe0cc;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            color: #333;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="number"]:focus,
        input[type="date"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #ff8c00;
            background: white;
            box-shadow: 0 0 8px rgba(255, 140, 0, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .file-upload-group {
            position: relative;
        }

        .file-input-label {
            display: inline-block;
            padding: 12px 20px;
            background: #ffe0cc;
            color: #666;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            text-align: center;
        }

        .file-input-label:hover {
            background: #ff8c00;
            color: white;
        }

        input[type="file"] {
            display: none;
        }

        .file-name {
            margin-top: 8px;
            font-size: 13px;
            color: #999;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: center;
        }

        button {
            padding: 14px 40px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-save {
            background: #ff8c00;
            color: white;
            flex: 1;
            max-width: 250px;
        }

        .btn-save:hover {
            background: #e67e00;
            box-shadow: 0 6px 20px rgba(255, 140, 0, 0.3);
        }

        .btn-save:active {
            transform: translateY(2px);
        }

        .btn-clear {
            background: #ffe0cc;
            color: #666;
            flex: 1;
            max-width: 250px;
        }

        .btn-clear:hover {
            background: #ff8c00;
            color: white;
        }

        .btn-clear:active {
            transform: translateY(2px);
        }

        .user-info {
            background: #fef5f0;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #ff8c00;
        }

        .user-info-content {
            display: flex;
            gap: 20px;
        }

        .user-info-item {
            display: flex;
            flex-direction: column;
        }

        .user-info-label {
            font-size: 12px;
            color: #999;
            font-weight: 600;
            text-transform: uppercase;
        }

        .user-info-value {
            font-size: 16px;
            color: #333;
            font-weight: 600;
        }

        .logout-btn {
            background: #ff8c00;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #e67e00;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .dashboard-card {
                padding: 25px;
            }

            .button-group {
                flex-direction: column;
            }

            .btn-save,
            .btn-clear {
                max-width: 100%;
            }

            .user-info {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .user-info-content {
                flex-direction: column;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-section">
                <div class="logo">
                    <div class="logo-text">📚</div>
                </div>
                <h1>BookBazaar</h1>
            </div>
            <p class="subtitle">Seller Dashboard</p>
        </div>

        <div class="dashboard-card">
            <div class="user-info">
                <div class="user-info-content">
                    <div class="user-info-item">
                        <span class="user-info-label">Seller Name</span>
                        <span class="user-info-value" id="sellerName">Welcome, Seller</span>
                    </div>
                    <div class="user-info-item">
                        <span class="user-info-label">Member Since</span>
                        <span class="user-info-value">April 2026</span>
                    </div>
                </div>
                <button class="logout-btn">Logout</button>
            </div>

            <h2 class="dashboard-title">Add New Book Listing</h2>

            <form id="bookListingForm">
                <!-- Seller Information Section -->
                <div class="form-section">
                    <div class="section-title">Seller Information</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="seller">Seller Name</label>
                            <input type="text" id="seller" name="seller" placeholder="Enter your name" required>
                        </div>
                        <div class="form-group">
                            <label for="location">Location</label>
                            <input type="text" id="location" name="location" placeholder="City, State" required>
                        </div>
                    </div>
                </div>

                <!-- Book Information Section -->
                <div class="form-section">
                    <div class="section-title">Book Information</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="bookName">Book Name</label>
                            <input type="text" id="bookName" name="bookName" placeholder="Enter book title" required>
                        </div>
                        <div class="form-group">
                            <label for="author">Author</label>
                            <input type="text" id="author" name="author" placeholder="Enter author name" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="category">Category</label>
                            <select id="category" name="category" required>
                                <option value="">Select a category</option>
                                <option value="fiction">Fiction</option>
                                <option value="non-fiction">Non-Fiction</option>
                                <option value="mystery">Mystery & Thriller</option>
                                <option value="romance">Romance</option>
                                <option value="sci-fi">Science Fiction</option>
                                <option value="fantasy">Fantasy</option>
                                <option value="history">History</option>
                                <option value="biography">Biography</option>
                                <option value="self-help">Self-Help</option>
                                <option value="educational">Educational</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="language">Language</label>
                            <input type="text" id="language" name="language" placeholder="e.g., English, Hindi" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="price">Price</label>
                            <input type="number" id="price" name="price" placeholder="Enter price" min="1" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label for="pageNo">Total Pages</label>
                            <input type="number" id="pageNo" name="pageNo" placeholder="Enter number of pages" min="1" required>
                        </div>
                    </div>
                </div>

                <!-- Book Details Section -->
                <div class="form-section">
                    <div class="section-title">Book Details</div>
                    
                    <div class="form-row full">
                        <div class="form-group file-upload-group">
                            <label for="picture">Book Cover Picture</label>
                            <label for="picture" class="file-input-label">Choose File</label>
                            <input type="file" id="picture" name="picture" accept="image/*" required>
                            <div class="file-name" id="fileName">No file selected</div>
                        </div>
                    </div>

                    <div class="form-row full">
                        <div class="form-group">
                            <label for="otherInfo">Additional Information</label>
                            <textarea id="otherInfo" name="otherInfo" placeholder="Enter any additional details about the book (condition, edition, etc.)"></textarea>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="button-group">
                    <button type="submit" class="btn-save">Save Listing</button>
                    <button type="reset" class="btn-clear">Clear</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // File input handler
        const fileInput = document.getElementById('picture');
        const fileNameDisplay = document.getElementById('fileName');

        fileInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                fileNameDisplay.textContent = this.files[0].name;
            } else {
                fileNameDisplay.textContent = 'No file selected';
            }
        });

        // Form submission
        document.getElementById('bookListingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Collect form data
            const formData = new FormData(this);
            const data = Object.fromEntries(formData);
            
            // You can send this data to your backend
            console.log('Book Listing Data:', data);
            alert('Book listing added successfully! (This is a demo)');
            
            // Reset form
            this.reset();
            fileNameDisplay.textContent = 'No file selected';
        });

        // Clear button handler
        document.querySelector('.btn-clear').addEventListener('click', function() {
            fileNameDisplay.textContent = 'No file selected';
        });

        // Logout button
        document.querySelector('.logout-btn').addEventListener('click', function() {
            if(confirm('Are you sure you want to logout?')) {
                // Redirect to login page
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
