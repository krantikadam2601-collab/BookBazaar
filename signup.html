<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookBazaar</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    

  <div class="brand">
    <img src="BBlogo.jpeg" alt="BookBazaar Logo" class="logo">
    <h1 id="logoname">BookBazaar</h1>
    <p class="tagline">Buy, Sell and Exchange Books Easily</p>
  </div>

  <div class="signup-container">
    <h2>Sign Up</h2>

    <input type="email" id="signupEmail" placeholder="Enter Email">
    <input type="password" id="signupPassword" placeholder="Enter Password">

    <button onclick="signUp()">Sign Up</button>

    <p>Already have an account?
      <a href="login.html">Login</a>
    </p>
  </div>


    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script src="js/firebaseConfig.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
